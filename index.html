<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dev Notes — A Minimal Tech Blog</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" crossorigin="anonymous">
  </head>
  <body>
    <header class="site-header">
      <a class="logo" href="#/">Dev Notes</a>
      <div class="search-wrap">
        <input id="search" placeholder="Search posts, tags, categories..." aria-label="Search posts">
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <section class="about">
          <h3>About</h3>
          <p>Developer-focused notes, tutorials, and experiments. Code-first, minimal UI.</p>
        </section>

        <section class="filters">
          <h4>Categories</h4>
          <ul id="categories"></ul>

          <h4>Tags</h4>
          <ul id="tags" class="tags"></ul>
        </section>
      </aside>

      <main class="content">
        <div id="listing"></div>
        <article id="post" class="post hidden"></article>
      </main>
    </div>

    <footer class="site-footer">© <span id="year"></span> Dev Notes — Built for developers</footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/5.0.2/marked.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js" crossorigin="anonymous"></script>
    <script src="assets/js/site.js"></script>
  </body>
</html>
