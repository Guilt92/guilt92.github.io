baseURL = "https://guilt92.github.io/"
languageCode = "en-us"
title = "DevNotes"
enableRobotsTXT = true
paginate = 6

[params]
  author = "DevNotes"
  description = "Concise, practical developer notes and tutorials"
  # To enable utterances comments set your repo: e.g. "Guilt92/guilt92.github.io"
  utterancesRepo = ""

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[permalinks]
  posts = "/posts/:slug/"

[markup]
  [markup.highlight]
    noClasses = false
    style = "monokai"
    guessSyntax = true
